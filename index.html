<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMCHI MART - Staff Training Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #FFF8F0;
    color: #2D2D2D;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px 20px;
    max-width: 500px;
  }
  h1 {
    font-size: 2.8em;
    color: #8B0000;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 1.1em;
    color: #555;
    margin-bottom: 50px;
  }
  .lang-label {
    font-size: 0.95em;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .lang-links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  .lang-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 280px;
    padding: 18px 30px;
    border-radius: 14px;
    text-decoration: none;
    font-size: 1.15em;
    font-weight: 700;
    transition: all 0.3s;
    box-shadow: 0 3px 12px rgba(0,0,0,0.08);
  }
  .lang-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  }
  .lang-btn.en {
    background: #8B0000;
    color: white;
  }
  .lang-btn.en:hover { background: #A52A2A; }
  .lang-btn.ko {
    background: white;
    color: #8B0000;
    border: 2px solid #8B0000;
  }
  .lang-btn.ko:hover { background: #FFF0F0; }
  .lang-btn.es {
    background: white;
    color: #E65100;
    border: 2px solid #E65100;
  }
  .lang-btn.es:hover { background: #FFF8F0; }
  .flag { font-size: 1.4em; }
  .footer {
    margin-top: 60px;
    font-size: 0.82em;
    color: #AAA;
  }
</style>
</head>
<body>
<div class="container">
  <h1>KIMCHI MART</h1>
  <div class="subtitle">Staff Training Guide</div>
  <div class="lang-label">Select Language</div>
  <div class="lang-links">
    <a href="en.html" class="lang-btn en">
      <span class="flag">&#x1F1FA;&#x1F1F8;</span> English
    </a>
    <a href="ko.html" class="lang-btn ko">
      <span class="flag">&#x1F1F0;&#x1F1F7;</span> Korean
    </a>
    <a href="es.html" class="lang-btn es">
      <span class="flag">&#x1F1EA;&#x1F1F8;</span> Spanish
    </a>
  </div>
  <div class="footer">KIMCHI MART &copy; 2026</div>
</div>
</body>
</html>
